<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8" />
    <style>
        /* Table Wrapper tinh tế */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            overflow: hidden;
        }

        /* Hiệu ứng ảnh sản phẩm */
        .product-img-wrapper {
            width: 70px;
            height: 50px;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        tr:hover .product-img {
            transform: scale(1.15);
        }

        /* Styling Table Header */
        .table thead th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            padding: 1.25rem 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        /* Price & Text */
        .price-tag {
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-name {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.95rem;
        }

        /* Custom Badges */
        .badge-category {
            background: #eef2ff;
            color: #6366f1;
            font-weight: 700;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        /* Nút thao tác nhẹ nhàng */
        .btn-edit {
            color: #6366f1;
            background: #f5f3ff;
            border: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-edit:hover {
            background: #6366f1;
            color: white;
        }

        .btn-delete {
            color: #ef4444;
            background: #fef2f2;
            border: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="container">
    <div class="d-flex justify-content-between align-items-end mb-5">
        <div>
            <span class="badge bg-primary-subtle text-primary mb-2 px-3">Hệ thống JPA</span>
            <h2 class="fw-800 mb-0" style="letter-spacing: -1px;">Quản lý Sản phẩm</h2>
        </div>
        <a th:href="@{/products/add}" class="btn btn-primary d-flex align-items-center px-4 py-2 shadow">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-plus-circle-fill me-2" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3v-3z"/>
            </svg>
            Thêm sản phẩm
        </a>
    </div>

    <div class="card glass-card shadow-lg border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Mã số</th>
                            <th>Thông tin sản phẩm</th>
                            <th>Hình ảnh</th>
                            <th>Giá niêm yết</th>
                            <th>Danh mục</th>
                            <th class="text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td class="ps-4">
                                <span class="text-muted fw-bold" th:text="${'#ID-' + product.id}"></span>
                            </td>
                            <td>
                                <div class="product-name" th:text="${product.name}"></div>
                            </td>
                            <td>
                                <div class="product-img-wrapper">
                                    <img th:src="${product.image}" class="product-img" alt="Product">
                                </div>
                            </td>
                            <td>
                                <span class="price-tag fs-5" 
                                      th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                            </td>
                            <td>
                                <span class="badge-category" 
                                      th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}">
                                </span>
                            </td>
                            <td class="text-end pe-4">
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/products/edit/{id}(id=${product.id})}" 
                                       class="btn btn-edit btn-sm px-3 rounded-pill">
                                        Sửa
                                    </a>
                                    <a th:href="@{/products/delete/{id}(id=${product.id})}"
                                       class="btn btn-delete btn-sm px-3 rounded-pill"
                                       onclick="return confirm('Xác nhận xóa sản phẩm này khỏi hệ thống?')">
                                        Xóa
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="6" class="text-center py-5">
                                <img src="https://cdn-icons-png.flaticon.com/512/5089/5089733.png" width="80" style="opacity: 0.2;" class="mb-3">
                                <p class="text-muted fw-500">Kho hàng hiện đang trống.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
