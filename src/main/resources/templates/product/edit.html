<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa sản phẩm | Admin CoreStore</title>
    <style>
        /* Card hiệu ứng kính mờ và Gradient Border */
        .premium-card {
            max-width: 750px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .premium-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
        }

        /* Label hiện đại */
        .form-label {
            font-weight: 700;
            color: #1e293b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.6rem;
        }

        /* Inputs tinh tế */
        .form-control, .form-select {
            border: 1.5px solid #f1f5f9;
            background-color: #f8fafc;
            border-radius: 14px;
            padding: 0.9rem 1.2rem;
            font-weight: 500;
            color: #334155;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control:focus, .form-select:focus {
            background-color: #ffffff;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        /* Container ảnh xem trước */
        .img-preview-wrapper {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            padding: 5px;
            background: #fff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        .img-preview-wrapper img {
            border-radius: 16px;
            object-fit: cover;
        }

        /* Nút bấm Premium */
        .btn-premium-update {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 16px;
            font-weight: 800;
            letter-spacing: 0.5px;
            transition: all 0.4s;
        }

        .btn-premium-update:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 12px 20px rgba(99, 102, 241, 0.3);
            filter: brightness(1.1);
        }

        .btn-premium-cancel {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 1rem 2rem;
            border-radius: 16px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-premium-cancel:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .input-group-text {
            background: #f8fafc;
            border: 1.5px solid #f1f5f9;
            border-right: none;
            border-radius: 14px 0 0 14px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
<div layout:fragment="content" class="container">
    <div class="card premium-card border-0">
        <div class="card-body p-4 p-md-5">
            
            <div class="d-flex align-items-center mb-5">
                <div class="p-3 rounded-4 me-4 shadow-sm" style="background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="#6366f1" class="bi bi-gear-wide-connected" viewBox="0 0 16 16">
                        <path d="M7.068.727c.243-.97 1.62-.97 1.864 0l.071.286a.96.96 0 0 0 1.622.634l.244-.163c.845-.563 1.972.564 1.41 1.41l-.163.244a.96.96 0 0 0 .634 1.622l.286.071c.97.243.97 1.62 0 1.864l-.286.071a.96.96 0 0 0-.634 1.622l.163.244c.563.845-.564 1.972-1.41 1.41l-.244-.163a.96.96 0 0 0-1.622.634l-.071.286c-.243.97-1.62.97-1.864 0l-.071-.286a.96.96 0 0 0-1.622-.634l-.244.163c-.845.563-1.972-.564-1.41-1.41l.163-.244a.96.96 0 0 0-.634-1.622l-.286-.071c-.97-.243-.97-1.62 0-1.864l.286-.071a.96.96 0 0 0 .634-1.622l-.163-.244c-.563-.845.564-1.972 1.41-1.41l.244.163a.96.96 0 0 0 1.622-.634l.071-.286zM12.973 8.5H8.25l-.064-.132a1 1 0 0 0-1.28-.433l-.132.064V3.727c0-.244-.167-.44-.393-.44h-.394c-.226 0-.393.196-.393.44V8h-4.723c-.244 0-.44.167-.44.393v.394c0 .226.196.393.44.393H2.5v4.723c0 .244.167.44.393.44h.394c.226 0 .393-.196.393-.44V9.5h4.723c.244 0 .44-.167.44-.393v-.394c0-.226-.196-.393-.44-.393z"/>
                    </svg>
                </div>
                <div>
                    <h2 class="fw-800 text-dark mb-1" style="letter-spacing: -1px;">Hiệu chỉnh sản phẩm</h2>
                    <p class="text-muted small mb-0 fw-500">
                        Thông tin chi tiết cho sản phẩm mã <span class="badge bg-dark-subtle text-dark rounded-pill px-3" th:text="${'#INV-' + product.id}"></span>
                    </p>
                </div>
            </div>

            <form th:action="@{/products/update}" th:object="${product}" method="post">
                
                <input type="hidden" th:field="*{id}" />

                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label" for="name">Tên sản phẩm</label>
                        <input type="text" th:field="*{name}" id="name"
                               class="form-control" placeholder="Nhập tên chính thức..." required />
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="image">Hình ảnh sản phẩm (URL)</label>
                        <div class="d-flex gap-4 align-items-center">
                            <div class="img-preview-wrapper flex-shrink-0">
                                <img th:src="*{image}" alt="Preview" class="w-100 h-100 shadow-sm">
                            </div>
                            <div class="flex-grow-1">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                                    <input type="text" th:field="*{image}" id="image"
                                           class="form-control" placeholder="Dán đường dẫn ảnh tại đây..." />
                                </div>
                                <div class="form-text text-muted small mt-2">Đề xuất ảnh tỉ lệ 4:3 để hiển thị đẹp nhất.</div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="price">Giá bán công bố</label>
                        <div class="input-group">
                            <input type="number" th:field="*{price}" id="price"
                                   class="form-control" placeholder="0" required />
                            <span class="input-group-text bg-white border-start-0 text-dark fw-bold">VNĐ</span>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="category">Phân loại danh mục</label>
                        <select th:field="*{category}" id="category" class="form-select">
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="mt-5 pt-4 border-top d-flex flex-column-reverse flex-md-row justify-content-between align-items-center gap-3">
                    <a th:href="@{/products}" class="btn-premium-cancel text-decoration-none">
                        <i class="bi bi-arrow-left me-2"></i>Hủy thao tác
                    </a>
                    <button type="submit" class="btn btn-premium-update text-white shadow">
                        Cập nhật hệ thống
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
